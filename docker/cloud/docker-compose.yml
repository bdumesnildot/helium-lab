# VPN client

networks:
    traefik_proxy:
        external: true

services:
    # ----------------------------------------
    # FILEBROWSER QUANTUM
    # File manager with a web interface, supports multiple users and permissions.
    # ----------------------------------------
    filebrowser-quantum:
        image: gtstef/filebrowser:stable
        container_name: filebrowser-quantum
        user: ${PUID}:${PGID}
        environment:
            FILEBROWSER_CONFIG: config.yml
            DOMAIN: ${DOMAIN}
        networks:
            - traefik_proxy
        ports:
            - ${FILEBROWSER_PORT}:80
        volumes:
            - ./filebrowser/config.yml:/home/filebrowser/config.yml:ro
            # -- data & cache
            - /srv/docker/filebrowser-quantum/data:/home/filebrowser/data
            - /srv/docker/filebrowser/tmp:/home/filebrowser/tmp # Required if uid other than 1000
            # -- path
            - ${STORAGE_PATH}:/storage
            - ~/:/server:ro
        labels:
            # -- traefik
            traefik.enable: true
            traefik.http.routers.filebrowser.rule: Host(`files.${DOMAIN}`)
            traefik.http.routers.filebrowser.entrypoints: websecure
            traefik.http.routers.filebrowser.tls.certresolver: myresolver
            traefik.http.routers.filebrowser.middlewares: authentik-auth
            # -- backup
            docker-volume-backup.stop-during-backup: filebrowser-service
        restart: unless-stopped
