# VPN client

services:
    # ----------------------------------------
    # QBITTORRENT
    # Torrent Client
    # ----------------------------------------
    qbittorrent:
        image: linuxserver/qbittorrent:latest
        container_name: qbittorrent
        environment:
            TZ: ${TZ}
            PUID: ${PUID}
            PGID: ${PGID}
            WEBUI_PORT: ${QBITTORRENT_PORT}
        network_mode: "container:gluetun" # see gluetun for traefik routing
        volumes:
            - /srv/docker/qbittorrent/config:/config
            - ${MEDIA_PATH}/torrents/completed:/downloads
        restart: unless-stopped

    # ----------------------------------------
    # NZBGET
    # Usenet client
    # ----------------------------------------
    nzbget:
        image: lscr.io/linuxserver/nzbget:latest
        container_name: nzbget
        environment:
            TZ: ${TZ}
            PUID: ${PUID}
            PGID: ${PGID}
            NZBGET_USER: ${NZBGET_USER}
            NZBGET_PASS: ${NZBGET_PASS}
        network_mode: "container:gluetun" # see gluetun for traefik routing
        volumes:
            - /srv/docker/nzbget/config:/config
            - ${MEDIA_PATH}/usenet/completed:/downloads/completed
            - ${MEDIA_PATH}/usenet/intermediate:/downloads/intermediate
            - ${MEDIA_PATH}/usenet/tmp:/downloads/tmp
            - ${MEDIA_PATH}/usenet/logs/nzbget.log:/downloads/nzbget.log
        restart: unless-stopped
