# VPN client

services:
    # ----------------------------------------
    # QBITTORRENT
    # Torrent Client
    # ----------------------------------------
    qbittorrent:
        image: linuxserver/qbittorrent:latest
        container_name: qbittorrent
        environment:
            TZ: ${TZ}
            PUID: ${PUID}
            PGID: ${PGID}
            WEBUI_PORT: ${QBITTORRENT_PORT}
            # VPN MODS for port forwarding sync (https://deepwiki.com/t-anc/GSP-Qbittorent-Gluetun-sync-port-mod/2.1-deployment-options#method-2-standalone-container-installation)
            DOCKER_MODS: ghcr.io/t-anc/gsp-qbittorent-gluetun-sync-port-mod:main
            GSP_GTN_API_KEY: ${GSP_GTN_API_KEY}
        network_mode: "container:gluetun" # see gluetun for traefik routing
        volumes:
            - /srv/docker/qbittorrent/config:/config
            - ${MEDIA_PATH}/torrents/completed:/downloads
        labels:
            docker-volume-backup.stop-during-backup: qbittorrent-service
            com.centurylinklabs.watchtower.enable: "true"
        restart: unless-stopped

