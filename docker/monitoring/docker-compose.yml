# Monitoring

networks:
    traefik_proxy:
        external: true
    docker_socket_proxy:
        external: true

services:
    # ----------------------------------------
    # UPTIME KUMA
    # Monitoring tool for uptime and performance of services
    # ----------------------------------------
    uptime-kuma:
        image: louislam/uptime-kuma:2
        container_name: uptime-kuma
        user: ${PUID}:${PGID}
        environment:
            TZ: ${TZ}
        networks:
            - traefik_proxy
            - docker_socket_proxy
        ports:
            - ${UPTIME_KUMA_PORT}:3001
        volumes:
            - /srv/docker/uptime-kuma/data:/app/data
        labels:
            traefik.enable: true
            traefik.docker.network: traefik_proxy
            traefik.http.routers.uptime-kuma.rule: Host(`kuma.${DOMAIN}`)
            traefik.http.routers.uptime-kuma.entrypoints: websecure
            traefik.http.routers.uptime-kuma.tls.certresolver: myresolver
            traefik.http.routers.uptime-kuma.middlewares: authentik-auth
            # -- backup
            docker-volume-backup.stop-during-backup: uptime-kuma-service
            # -- version monitoring
            com.centurylinklabs.watchtower.enable: "true"
            com.centurylinklabs.watchtower.monitor-only: "true"
        restart: unless-stopped
