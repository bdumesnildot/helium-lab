# REVERSE PROXY

volumes:
    server_traefik_letsencrypt:
    server_traefik_logs:
        external: true

networks:
    traefik_proxy:
        external: true
    docker_socket_proxy:
        external: true

services:
    # ----------------------------------------
    # TRAEFIK
    # Reverse Proxy + SSL Support
    # ----------------------------------------
    traefik:
        image: traefik:v3.6.7
        container_name: traefik
        user: root
        environment:
            DOMAIN: ${DOMAIN}
            CF_DNS_API_TOKEN: ${CLOUDFLARE_DNS_API_TOKEN}
        networks:
            - traefik_proxy
            - docker_socket_proxy
        ports:
            - 80:80
            - 443:443
        volumes:
            - server_traefik_letsencrypt:/letsencrypt
            - server_traefik_logs:/var/log/traefik
        command:
            - --api.dashboard=true
            ## -- observability
            - --log.level=debug
            - --accessLog.filePath=/var/log/traefik/access.log
            - --accesslog=true
            - --accessLog.format=common
            - --accesslog.fields.defaultmode=keep
            - --accesslog.fields.headers.defaultmode=keep
            - --accesslog.fields.headers.names.Authorization=drop
            ## -- providers
            - --providers.docker=true
            - --providers.docker.exposedbydefault=false
            - --providers.docker.endpoint=tcp://socket-proxy:2375
            ## -- entrypoints
            - --entryPoints.web.address=:80
            - --entryPoints.websecure.address=:443
            # -- forwarded headers (Cloudflare IPs) - optional
            # -- https://www.cloudflare.com/ips-v4 & https://www.cloudflare.com/ips-v6
            - --entryPoints.web.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
            - --entryPoints.websecure.forwardedHeaders.trustedIPs=173.245.48.0/20,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,141.101.64.0/18,108.162.192.0/18,190.93.240.0/20,188.114.96.0/20,197.234.240.0/22,198.41.128.0/17,162.158.0.0/15,104.16.0.0/13,104.24.0.0/14,172.64.0.0/13,131.0.72.0/22,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32
            ## -- tls certificates
            - --certificatesresolvers.myresolver.acme.email=${EMAIL}
            - --certificatesresolvers.myresolver.acme.storage=letsencrypt/acme.json
            - --certificatesresolvers.myresolver.acme.dnschallenge=true
            - --certificatesresolvers.myresolver.acme.dnschallenge.provider=cloudflare
        labels:
            traefik.enable: true
            traefik.docker.network: traefik_proxy

            ## -- Router dashboard
            traefik.http.routers.traefik-dashboard.service: api@internal
            traefik.http.routers.traefik-dashboard.rule: Host(`traefik.${DOMAIN}`)
            traefik.http.routers.traefik-dashboard.entrypoints: websecure
            traefik.http.routers.traefik-dashboard.tls.certresolver: myresolver
            traefik.http.routers.traefik-dashboard.middlewares: authentik-auth

            ## -- Middelware "ratelimit"
            # traefik.http.middlewares.ratelimit.ratelimit.average: 100
            # traefik.http.middlewares.ratelimit.ratelimit.period: 1m

            ## -- Middelware "authentik-auth"
            traefik.http.middlewares.authentik-auth.forwardAuth.address: http://authentik-server:9000/outpost.goauthentik.io/auth/traefik
            traefik.http.middlewares.authentik-auth.forwardAuth.trustForwardHeader: true
            traefik.http.middlewares.authentik-auth.forwardauth.authResponseHeaders: X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version

            # -- Watchtower
            com.centurylinklabs.watchtower.enable: "true"
            com.centurylinklabs.watchtower.monitor-only: "true"
        restart: always
