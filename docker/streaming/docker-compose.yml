    #         traefik.http.routers.overseerr.middlewares: authentik-auth
    #     restart: unless-stopped

    # ----------------------------------------
    # JELLYFIN
    # An alternative to Plex
    # ----------------------------------------
    jellyfin:
        image: lscr.io/linuxserver/jellyfin:latest
        container_name: jellyfin
        environment:
            TZ: ${TZ}
            PUID: ${PUID}
            PGID: ${PGID}
            JELLYFIN_PublishedServerUrl: https://jellyfin.${DOMAIN}
        networks:
            - traefik_proxy
        ports:
            - ${JELLYFIN_PORT}:8096
            - 7359:7359/udp
            - 1900:1900/udp
        volumes:
            - /srv/docker/jellyfin/config:/config
            - ${MEDIA_UNIFIED_PATH}/series:/data/tvshows
            - ${MEDIA_UNIFIED_PATH}/movies:/data/movies
        labels:
            # -- traefik
            traefik.enable: true
            traefik.http.routers.jellyfin.rule: Host(`jellyfin.${DOMAIN}`)
            traefik.http.routers.jellyfin.entrypoints: websecure
            traefik.http.routers.jellyfin.tls.certresolver: myresolver
            traefik.http.services.jellyfin.loadbalancer.server.port: 8096
            # -- auth: forward auth is disabled for now to prefer a LDAP settings in jellyfin and allow mobile app access
            # traefik.http.routers.jellyfin.middlewares: authentik-auth
        restart: unless-stopped
